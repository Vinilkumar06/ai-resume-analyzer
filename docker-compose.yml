version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: resume_analyzer_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_analyzer_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: resume_analyzer
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - uploads:/app/uploads

  frontend:
    image: node:18-alpine
    container_name: resume_analyzer_frontend
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
  uploads:
